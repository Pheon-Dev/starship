vimcmd_visual_symbol = "[‚ùÆ](bold yellow)"

[git_status]
format = "[[(* $conflicted$untracked$modified$staged$renamed$deleted)](218)($ahead$behind$stashed)]($style)"
style = "cyan"
conflicted = "‚öë "
renamed = "Ó©≥ "
deleted = "‚úñ "
