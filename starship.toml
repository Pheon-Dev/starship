# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'

# Inserts a blank line between shell prompts
add_newline = false

format = """
[έΦΔ ΌΛΟ  ](bold purple)\
$git_branch\
$git_state\
$git_status\
$golang\
$rust\
$battery\
$time\
$c\
$lua\
$node_js\
$python\
$docker_context\
$package\
$line_break\
[έΦΔ ](bold purple)\
$cmd_duration\
$directory\
$character"""

[character]
success_symbol = "[έζψ](bold green)"
error_symbol = "[έζψ](bold red)"
vimcmd_symbol = "[έζχ](bold purple)"
vimcmd_replace_one_symbol = "[έζχ](bold blue)"
vimcmd_replace_symbol = "[έζχ](bold blue)"
vimcmd_visual_symbol = "[έζχ](bold yellow)"

[git_status]
format = "[[(* $conflicted$untracked$modified$staged$renamed$deleted)](218)($ahead$behind$stashed)]($style)"
style = "cyan"
conflicted = "έγΣ "
renamed = "Όσ│ "
deleted = "έεΨ "
ahead = "έΗΣ┬╖"
behind = "έΗΥ┬╖"
staged = "έΩΠ "
modified = "έεγ "
untracked = "έΑο "
stashed = "έΚκ "

[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\) '
style = "bright-black"

[cmd_duration]
format = "[$duration]($style) "
style = "yellow"

[c]
symbol = "Όαη "

[directory]
read_only = " Ύι╜"
style = "blue"

[docker_context]
symbol = "ΎΝΙ "

[git_branch]
# symbol = "ΎΡα "
symbol = "ΎΘΥ  "
style = "green"

[golang]
symbol = "Όαπ "

[python]
symbol = "ΌΙ╡  "

[lua]
symbol = "Όαι "

[nodejs]
symbol = "Όεα "

[package]
symbol = "ΎμΨ "

[rust]
symbol = "Όηρ "

[battery]
full_symbol = '≤░Β╣ '
charging_symbol = '≤▒ΡΜ '
discharging_symbol = '≤▒ΡΝ '

[[battery.display]]
threshold = 20
style = 'bold red'

[[battery.display]]
threshold = 30
style = 'bold red'

[[battery.display]]
threshold = 50
style = 'bold yellow'

[[battery.display]]
threshold = 100
style = 'bold green'

[time]
disabled = false
format = 'at [$time]($style) '
time_format = '%a %b %d %R'
# utc_time_offset = '-5'
# time_range = '10:00:00-14:00:00'
