# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'

# Inserts a blank line between shell prompts
add_newline = false

format = """
[‚îÉ Óäé  ](bold purple)\
$git_branch\
$git_state\
$git_status\
$golang\
$rust\
$c\
$docker_context\
$lua\
$node_js\
$python\
$package\
$cmd_duration\
$line_break\
[‚îÉ ](bold purple)\
$username\
$hostname\
$directory\
$character"""

[character]
success_symbol = "[‚ùØ](bold purple)"
error_symbol = "[‚ùØ](bold red)"
vimcmd_symbol = "[‚ùÆ](bold purple)"
vimcmd_replace_one_symbol = "[‚ùÆ](bold green)"
