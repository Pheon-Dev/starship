# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'

# Inserts a blank line between shell prompts
add_newline = false

# # Replace the 'вқҜ' symbol in the prompt with 'вһң'
# [character] # The name of the module we are configuring is 'character'
# success_symbol = '[вһң](bold green)' # The 'success_symbol' segment is being set to 'вһң' with the color 'bold green'

# # Disable the package module, hiding it from the prompt completely
# [package]
# disabled = false

format = """
[в”Ӯ ](bold purple)\
$git_branch\
$git_state\
$git_status\
$golang\
$rust\
$c\
$docker_context\
$lua\
$node_js\
$package\
$cmd_duration\
$line_break\
[в”Ӯ ](bold purple)\
$username\
$hostname\
$directory\
$character"""

[character]
success_symbol = "[вқҜ](purple)"
error_symbol = "[вқҜ](red)"
vimcmd_symbol = "[вқ®](green)"

[git_status]
format = "[[(* $conflicted$untracked$modified$staged$renamed$deleted)](218)($ahead$behind$stashed)]($style)"
style = "cyan"
conflicted = "вҡ‘ "
renamed = "о©і "
deleted = "вң– "
ahead = "вҶ‘В·"
behind = "вҶ“В·"
staged = "в—Ҹ "
modified = "вңҡ "
untracked = "вҖҰ "
stashed = "вүЎ "

[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\) '
style = "bright-black"

[cmd_duration]
format = "[$duration]($style) "
style = "yellow"

[c]
symbol = "оҳһ "

[directory]
read_only = " п Ҫ"
style = "blue"

[docker_context]
symbol = "пҢҲ "

[git_branch]
# symbol = "пҗҳ "
symbol = "вҺҮ  "
style = "green"

[golang]
symbol = "оҳ§ "

[lua]
symbol = "оҳ  "

[nodejs]
symbol = "оңҳ "

[package]
symbol = "пЈ– "

[rust]
symbol = "оһЁ "

